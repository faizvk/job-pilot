<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      color: #111827;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .logo { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
    .content { padding: 16px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input, .field textarea {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.15s;
    }
    .field input:focus, .field textarea:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .field textarea { resize: none; height: 80px; }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: #4f46e5;
      color: white;
      box-shadow: 0 1px 3px rgba(79, 70, 229, 0.3);
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: white;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    .btn-secondary:hover { background: #f3f4f6; }
    .status { text-align: center; padding: 8px; font-size: 12px; border-radius: 8px; margin-top: 12px; }
    .status.success { background: #ecfdf5; color: #065f46; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .settings { padding: 12px 16px; border-top: 1px solid #e5e7eb; }
    .settings label { font-size: 11px; color: #6b7280; }
    .settings input { width: 100%; border: 1px solid #e5e7eb; border-radius: 6px; padding: 6px 8px; font-size: 12px; margin-top: 4px; outline: none; }
    .tag { display: inline-block; background: #eef2ff; color: #4f46e5; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; margin-right: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">JP</div>
    <div>
      <h1>JobPilot</h1>
      <p>Import job to your tracker</p>
    </div>
  </div>

  <div class="content">
    <div class="field">
      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="e.g. Software Engineer" />
    </div>
    <div class="field">
      <label>Company</label>
      <input type="text" id="companyName" placeholder="e.g. Google" />
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="location" placeholder="e.g. Bangalore, India" />
    </div>
    <div class="field">
      <label>Platform <span id="platformBadge" class="tag"></span></label>
      <input type="text" id="jobUrl" placeholder="Job URL" readonly />
    </div>
    <div class="field">
      <label>Job Description <span style="font-weight:400;text-transform:none">(auto-extracted)</span></label>
      <textarea id="jobDescription" placeholder="Paste or auto-extract from page..."></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="extractBtn">Re-extract</button>
      <button class="btn btn-primary" id="importBtn">Import to JobPilot</button>
    </div>

    <div id="statusMsg" class="status" style="display:none"></div>
  </div>

  <div class="settings">
    <label>JobPilot URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:3001" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
